<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../static/css/auth.css">
</head>

<body>

    <div class="auth-container" id="authContainer">
        <div class="card auth-card shadow-lg border-0">
                <div class="form-box login">
                <form id="loginForm" class="w-100" action="/auth/login" method="post">
                    <h1 class="mb-4">Login</h1>

                    <div class="form-floating mb-3 input-box">
                        <input id="loginUsername" name="identifier" type="text" class="form-control" placeholder="Username" required>
                        <label for="loginUsername">Username</label>
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>

                    <div class="form-floating mb-3 input-box">
                        <input id="loginPassword" name="password" type="password" class="form-control pe-5" placeholder="Password" required>
                        <label for="loginPassword">Password</label>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>

                    <div class="text-end mb-3">
                        <a href="#" class="small text-decoration-none" onclick="showForgotPassword(); return false;">Forgot password?</a>
                    </div>

                    <button class="btn btn-primary w-100 py-2">Login</button>
                </form>
            </div>

            <!-- FORGOT PASSWORD -->
            <div class="form-box forgot-password">
                <form id="forgotPasswordForm" class="w-100">
                    <h1 class="mb-3">Reset Password</h1>

                    <div id="forgotOtpStep">
                        <p class="text-muted mb-3">Enter your email to receive an OTP and reset your password.</p>
                        <div class="form-floating mb-3 input-box">
                            <input id="forgotEmail" name="email" type="email" class="form-control pe-5" placeholder="Email" required>
                            <label for="forgotEmail">Email</label>
                            <i class="fa-solid fa-envelope input-icon"></i>
                        </div>

                        <button id="btnSendOtp" type="button" class="btn btn-primary w-100 py-2 mb-3">Send OTP</button>

                        <div class="form-floating mb-3 input-box">
                            <input id="forgotOtp" name="otp" type="text" class="form-control pe-5" placeholder="OTP" maxlength="6" inputmode="numeric">
                            <label for="forgotOtp">OTP</label>
                            <i class="fa-solid fa-shield-halved input-icon"></i>
                        </div>

                        <button id="btnVerifyOtp" type="button" class="btn text-white w-100 py-2 mb-3" style="background-color: #0B3C5D; border-color: #0B3C5D;">Verify OTP</button>
                    </div>

                    <div id="forgotResetStep" class="d-none">
                        <p class="text-muted mb-3">Set your new password.</p>
                        <div class="form-floating mb-3 input-box">
                            <input id="forgotNewPassword" name="new_password" type="password" class="form-control pe-5" placeholder="New Password" minlength="8" required>
                            <label for="forgotNewPassword">New Password</label>
                            <i class="fa-solid fa-lock input-icon"></i>
                        </div>

                        <div class="form-floating mb-3 input-box">
                            <input id="forgotConfirmPassword" name="confirm_password" type="password" class="form-control pe-5" placeholder="Confirm Password" minlength="8" required>
                            <label for="forgotConfirmPassword">Confirm Password</label>
                            <i class="fa-solid fa-lock input-icon"></i>
                        </div>

                        <button id="btnResetPassword" type="button" class="btn btn-primary w-100 py-2 mb-3">Change Password</button>
                    </div>

                    <div class="text-center">
                        <a href="#" class="small text-decoration-none" onclick="showLogin(); return false;">
                            <i class="fa-solid fa-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                </form>
            </div>

            <!-- REGISTER -->
            <div class="form-box register">
                <form class="w-100" id="registerForm" action="/auth/signup" method="post">
                    <h1 class="mb-3">Register</h1>

                    <div id="registerStep1">
                    <div class="form-floating mb-2 input-box">
                        <input id="regUsername" name="username" type="text" class="form-control pe-5" placeholder="Username" required>
                        <label for="regUsername">Username</label>
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>

                    <div class="form-floating mb-2 input-box">
                        <input id="regEmail" name="email" type="email" class="form-control pe-5" placeholder="Email" required>
                        <label for="regEmail">Email</label>
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>

                    <div class="form-floating mb-2 input-box">
                        <input id="regPassword" name="password" type="password" class="form-control pe-5" placeholder="Password" minlength="8" required>
                        <label for="regPassword">Password</label>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>

                    <div class="form-floating mb-2 input-box">
                        <input type="tel" id="contactNumber" name="contact_number" class="form-control pe-5" placeholder="Contact Number" 
                               pattern="[0-9]{10}" maxlength="10" required>
                        <label for="contactNumber">Contact Number (10 digits)</label>
                        <i class="fa-solid fa-phone input-icon"></i>
                    </div>

                    <div class="form-floating mb-2 input-box">
                        <input type="tel" id="lovedOneContact" name="emergency_contact" class="form-control pe-5" placeholder="Loved One's Contact" 
                               pattern="[0-9]{10}" maxlength="10">
                        <label for="lovedOneContact">Loved One's Contact (Optional)</label>
                        <i class="fa-solid fa-heart input-icon"></i>
                    </div>

                    <div class="form-floating mb-2 input-box">
                        <input id="dateOfBirth" name="date_of_birth" type="date" class="form-control pe-5" placeholder="Date of Birth" required>
                        <label for="dateOfBirth">Date of Birth</label>
                        <i class="fa-solid fa-calendar input-icon"></i>
                    </div>

                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <div class="form-floating input-box">
                                    <input id="weight" name="weight" type="number" class="form-control pe-5" placeholder="Weight" 
                                        min="1" max="500" step="0.1" required>
                                    <label for="weight">Weight (kg)</label>
                                <i class="fa-solid fa-weight-scale input-icon"></i>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-floating input-box">
                                    <input id="height" name="height" type="number" class="form-control pe-5" placeholder="Height" 
                                        min="1" max="300" step="0.1" required>
                                    <label for="height">Height (cm)</label>
                                <i class="fa-solid fa-ruler-vertical input-icon"></i>
                            </div>
                        </div>
                    </div>

                    <button id="btnRegister" class="btn btn-primary w-100 py-2">Register</button>
                    </div>

                    <div id="registerStep2" class="d-none mt-3">
                        <div class="form-floating mb-2 input-box">
                            <input id="registerOtp" name="register_otp" type="text" class="form-control pe-5" placeholder="OTP" maxlength="6" inputmode="numeric">
                            <label for="registerOtp">Registration OTP</label>
                            <i class="fa-solid fa-shield-halved input-icon"></i>
                        </div>
                        <button id="btnConfirmRegisterOtp" type="button" class="btn text-white w-100 py-2" style="background-color: #0B3C5D; border-color: #0B3C5D;">Verify OTP & Complete Registration</button>
                    </div>
                </form>
            </div>

            <!-- TOGGLE -->
            <div class="toggle-box">
                <div class="toggle-panel toggle-left col">
                    <h2 class="mb-3">Hello, Welcome!</h2>
                    <p>Don't have an account?</p>
                    <button class="btn btn-outline-light" onclick="showRegister()">Register</button>
                </div>

                <div class="toggle-panel toggle-right col">
                    <h2 class="mb-3">Welcome Back!</h2>
                    <p>Already have an account?</p>
                    <button class="btn btn-outline-light" onclick="showLogin()">Login</button>
                </div>
            </div>

        </div>
    </div>

    <script src="../static/js/login.js"></script>

</body>

</html>
